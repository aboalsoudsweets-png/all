<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حلويات أبو السعود | منذ ١٨٩٦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon: #6d1f2b;
    --maroon-dark: #4a1420;
    --gold: #c9a24b;
    --gold-light: #e6c979;
    --parchment: #f2e6c9;
    --parchment-light: #f8f0dc;
    --ink: #2b1810;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    font-family: 'Cairo', sans-serif;
    background-color: var(--maroon-dark);
    color: var(--parchment-light);
    overflow-x:hidden;
  }

  body{
    background:
      radial-gradient(circle at 50% 0%, rgba(201,162,75,0.12), transparent 55%),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 6px),
      linear-gradient(160deg, var(--maroon) 0%, var(--maroon-dark) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding: 32px 16px;
  }

  .frame{
    position:relative;
    width:100%;
    max-width: 560px;
    padding: 3px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold) 40%, #8a6a2a 60%, var(--gold-light));
    border-radius: 6px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.55);
  }

  .card{
    background: var(--parchment);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(109,31,43,0.05), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(109,31,43,0.06), transparent 45%);
    border-radius: 4px;
    padding: 46px 34px 38px;
    position:relative;
    color: var(--ink);
    text-align:center;
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    inset: 10px;
    border: 1.5px solid var(--maroon);
    border-radius: 2px;
    pointer-events:none;
    opacity:0.55;
  }
  .card::after{
    content:"";
    position:absolute;
    inset: 15px;
    border: 1px solid var(--gold);
    border-radius: 2px;
    pointer-events:none;
    opacity:0.5;
  }

  .logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom: 10px;
  }

  .logo-wrap img{
    width: 190px;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.25));
  }

  .est-badge{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-family:'Cairo', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--maroon-dark);
    background: transparent;
    border-top: 1px solid rgba(109,31,43,0.4);
    border-bottom: 1px solid rgba(109,31,43,0.4);
    padding: 6px 18px;
    margin: 6px auto 22px;
  }

  h1{
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 46px;
    color: var(--maroon);
    line-height: 1.35;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    margin-bottom: 4px;
  }

  .subtitle{
    font-size: 14px;
    color: var(--maroon-dark);
    opacity: 0.85;
    letter-spacing: 1px;
    margin-bottom: 26px;
  }

  .divider{
    width: 130px;
    height: 14px;
    margin: 0 auto 30px;
    position:relative;
  }
  .divider::before{
    content:"❖";
    color: var(--maroon);
    font-size: 18px;
    position:absolute;
    left:50%;
    top:50%;
    transform: translate(-50%,-50%);
    background: var(--parchment);
    padding: 0 10px;
  }
  .divider::after{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    right:0;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--maroon), transparent);
  }

  .menu-links{
    display:flex;
    flex-direction:column;
    gap: 16px;
    margin-top: 8px;
  }

  .menu-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding: 16px 22px;
    background: linear-gradient(180deg, var(--maroon) 0%, var(--maroon-dark) 100%);
    color: var(--gold-light);
    text-decoration:none;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    font-size: 18px;
    border: 1px solid var(--gold);
    border-radius: 3px;
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  .menu-btn .ar{
    font-family:'Aref Ruqaa', serif;
    font-size: 21px;
  }

  .menu-btn .en{
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    opacity: 0.8;
    text-transform: uppercase;
  }

  .menu-btn .arrow{
    font-size: 16px;
    color: var(--gold);
    transition: transform 0.25s ease;
  }

  .menu-btn:hover{
    transform: translateY(-3px);
    background: linear-gradient(180deg, #7c2532 0%, var(--maroon-dark) 100%);
    box-shadow: 0 10px 22px rgba(0,0,0,0.35);
  }
  .menu-btn:hover .arrow{
    transform: translateX(-6px);
  }
  .menu-btn:focus-visible{
    outline: 2px solid var(--gold-light);
    outline-offset: 3px;
  }

  footer{
    margin-top: 34px;
    font-size: 12px;
    color: var(--maroon-dark);
    opacity: 0.7;
    letter-spacing: 1px;
  }

  @media (max-width: 420px){
    h1{ font-size: 36px; }
    .card{ padding: 36px 22px 30px; }
    .menu-btn{ padding: 14px 16px; font-size: 16px; }
  }
</style>
</head>
<body>

  <div class="frame">
    <div class="card">
      <div class="logo-wrap">
        <img src="logo.png" alt="شعار حلويات أبو السعود">
      </div>
      <h1>حلويات أبو السعود</h1>
      <div class="subtitle">عبق الأصالة منذ أكثر من قرن</div>

      <div class="est-badge">تأسس عام ١٨٩٦</div>

      <div class="divider"></div>

      <nav class="menu-links" aria-label="روابط المنيو">
        <!-- عدّل الروابط أدناه (href="#") لتشير إلى موقع كل منيو -->
        <a class="menu-btn" href="https://aboalsoudsweets-png.github.io/estern-menu/" target="_blank" rel="noopener">
          <span>
            <span class="ar">المنيو الشرقي</span><br>
            <span class="en">Eastern Menu</span>
          </span>
          <span class="arrow">⟵</span>
        </a>

        <a class="menu-btn" href="https://aboalsoudsweets-png.github.io/abo-alsoud/" target="_blank" rel="noopener">
          <span>
            <span class="ar">المنيو الغربي</span><br>
            <span class="en">Western Menu</span>
          </span>
          <span class="arrow">⟵</span>
        </a>

        <a class="menu-btn" href="https://aboalsoudsweets-png.github.io/.0/" target="_blank" rel="noopener">
          <span>
            <span class="ar">منيو الكافيه</span><br>
            <span class="en">Café Menu</span>
          </span>
          <span class="arrow">⟵</span>
        </a>
      </nav>

      <footer>حلويات أبو السعود &mdash; ١٨٩٦</footer>
    </div>
  </div>

</body>
</html>
